    <style>
        /* =========================================
           THEME VARIABLES
           ========================================= */
        :root { 
            --primary: #FF9933; 
            --secondary: #4a2c2a; 
            --bg-color: #FAFAFA; 
            --card-bg: #ffffff; 
            --text-color: #2b2b2b; 
            --ui-shadow: 0 4px 18px rgba(0, 0, 0, 0.05); 
            --powerful-shadow: 0 10px 30px rgba(255, 153, 51, 0.25); 
            --transition-speed: 0.3s;
            --radius-lg: 20px;
        }[data-theme="dark"] { 
            --primary: #FF9933; 
            --secondary: #140804; 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-color: #ececec; 
            --ui-shadow: 0 4px 18px rgba(0, 0, 0, 0.4); 
            --powerful-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); 
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color); 
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; 
            color: var(--text-color); 
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* --- App Header --- */
        .navbar { 
            background: linear-gradient(90deg, #E65100, var(--primary), #FF7043); 
            background-size: 200% auto; 
            animation: gradientMove 4s ease infinite; 
            box-shadow: 0 4px 15px rgba(255, 153, 51, 0.4); 
            padding: 15px 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1040;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .back-btn { color: white; font-size: 1.3rem; text-decoration: none; display: flex; align-items: center; }
        .back-btn:active { transform: scale(0.9); }
        .nav-title { color: white; font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); margin: 0; text-transform: uppercase; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* --- Alert Banner --- */
        .alert-banner {
            display: none;
            background: var(--card-bg);
            border-left: 5px solid var(--primary);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: var(--ui-shadow);
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 0.4s ease;
        }
        .alert-banner.active { display: flex; }
        .alert-info h4 { font-size: 0.85rem; opacity: 0.8; font-weight: 500; margin-bottom: 4px; }
        .alert-info h2 { font-size: 1.2rem; color: var(--primary); font-weight: 800; text-transform: uppercase;}
        
        .go-btn {
            background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(255, 153, 51, 0.4); transition: 0.2s;
        }
        .go-btn:active { transform: scale(0.9); box-shadow: none; }

        /* --- Calendar Card --- */
        .calendar-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px;
            box-shadow: var(--ui-shadow); margin-bottom: 24px; border: 1px solid rgba(255,153,51,0.1);
        }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-header button {
            background: rgba(255,153,51,0.1); color: var(--primary); border: none; width: 40px; height: 40px;
            border-radius: 12px; font-size: 1rem; cursor: pointer; transition: var(--transition-speed); font-weight: 800;
        }
        .cal-header button:active { transform: scale(0.9); background: var(--primary); color: white; }
        .cal-header h2 { font-size: 1.15rem; font-weight: 800; color: var(--text-color); font-family: 'Cinzel', serif;}

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px 4px; text-align: center; }
        .cal-day-name { font-size: 0.8rem; font-weight: 700; color: var(--text-color); opacity: 0.7; padding-bottom: 5px; }
        .cal-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1rem;
            border-radius: 12px; cursor: pointer; font-weight: 600; color: var(--text-color);
            border: 2px solid transparent; transition: 0.2s;
        }
        .cal-cell.empty { cursor: default; }

        /* Highlight Today */
        .cal-cell.is-today { border-color: var(--primary); color: var(--primary); font-weight: 800; }
        
        /* Highlight Ekadashi */
        .cal-cell.has-event {
            background: linear-gradient(135deg, var(--primary), #FF7043); color: #ffffff; font-weight: 800;
            box-shadow: 0 4px 10px rgba(255, 153, 51, 0.4); border: none;
        }
        .cal-cell.has-event:active { transform: scale(0.9); }

        /* --- Selected Details --- */
        .selected-section {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 15px;
            box-shadow: var(--ui-shadow); border: 1px solid rgba(255,153,51,0.1);
            display: none; align-items: center; gap: 15px; cursor: pointer; animation: fadeIn 0.3s ease;
        }
        .selected-section.active { display: flex; }
        .selected-img { width: 65px; height: 65px; border-radius: 14px; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid rgba(255,153,51,0.2);}
        .selected-info { flex-grow: 1; }
        .selected-info h3 { color: var(--text-color); font-size: 1.1rem; font-weight: 800; margin-bottom: 2px; }
        .selected-info p { color: var(--primary); font-size: 0.85rem; font-weight: 600; }

        /* --- Custom Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(5px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease; padding: 20px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-card {
            background: var(--card-bg); width: 100%; max-width: 360px; border-radius: 24px;
            overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transform: scale(0.8) translateY(30px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 153, 51, 0.2);
        }
        .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }

        .modal-img { width: 100%; height: 200px; object-fit: cover; }
        .modal-content { padding: 25px; text-align: center; }
        
        .modal-date {
            display: inline-block; background: rgba(255, 153, 51, 0.1); color: var(--primary);
            padding: 6px 16px; border-radius: 20px; font-weight: 800; font-size: 0.85rem; margin-bottom: 12px;
        }
        .modal-title { color: var(--text-color); font-size: 1.3rem; font-weight: 800; margin-bottom: 10px; font-family: 'Cinzel', serif; text-transform: uppercase;}
        .modal-desc { color: var(--text-color); opacity: 0.85; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; font-weight: 500;}

        .modal-info-msg {
            background: rgba(255, 153, 51, 0.1); border: 1px dashed rgba(255,153,51,0.5);
            color: var(--primary); padding: 14px; border-radius: 14px; font-size: 0.85rem;
            margin-bottom: 20px; font-weight: 700; display: none; 
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary), #E65100); color: white;
            text-decoration: none; padding: 14px; border-radius: 16px; font-weight: 800;
            display: block; width: 100%; box-shadow: 0 6px 15px rgba(255, 153, 51, 0.3);
            margin-bottom: 12px; transition: 0.2s; display: none;
        }
        .btn-close-custom {
            background: transparent; color: var(--text-color); border: 1px solid rgba(150,150,150,0.3);
            padding: 14px; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.2s;
        }
        .btn-primary-custom:active, .btn-close-custom:active { transform: scale(0.95); box-shadow: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>

        function getISTMidnight(dateObj = new Date()) {
            const utcTime = dateObj.getTime() + (dateObj.getTimezoneOffset() * 60000);
            const istTime = new Date(utcTime + (330 * 60000));
            istTime.setHours(0, 0, 0, 0); 
            return istTime;
        }

        function getISTDateString(offsetDays = 0, baseDate = new Date()) {
            const istTime = getISTMidnight(baseDate);
            istTime.setDate(istTime.getDate() + offsetDays);
            const y = istTime.getFullYear();
            const m = String(istTime.getMonth() + 1).padStart(2, '0');
            const d = String(istTime.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function syncThemeAndLanguage() {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) document.body.setAttribute('data-theme', 'dark');
            else document.body.removeAttribute('data-theme');

            let savedLang = localStorage.getItem('lang') || 'en';
            if(savedLang.toLowerCase().includes('hi')) savedLang = 'hi';
            else if(savedLang.toLowerCase().includes('mr')) savedLang = 'mr';
            else savedLang = 'en';

                DOM.calWeekdays.appendChild(div);
            });
        }

        function init() {
            syncThemeAndLanguage();
            
            eventsMap.clear();
            ekadasiData.forEach(event => {
                let specificImage = EKADASHI_IMAGES[event.name_key];
                let isPlaceholder = specificImage && specificImage.includes("your-link");
                let finalImage = (specificImage && specificImage.trim() !== "" && !isPlaceholder) ? specificImage : APP_LOGO_URL;

                eventsMap.set(event.date, {
                    ...event,
                    localizedName: texts[event.name_key],
                    image: finalImage 
                });
            });

            checkAlertBanner();
            renderCalendar(currentMonth, currentYear);
            
            DOM.btnPrev.addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                DOM.selectedSection.classList.remove('active');
                renderCalendar(currentMonth, currentYear);
            });

            DOM.btnNext.addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                DOM.selectedSection.classList.remove('active');
                renderCalendar(currentMonth, currentYear);
            });
        }

        function checkAlertBanner() {
            const todayStr = getISTDateString(0); 
            const tomStr = getISTDateString(1);   

            let activeEvent = eventsMap.get(todayStr);
            let status = activeEvent ? "today" : "";

            if (!activeEvent) {
                activeEvent = eventsMap.get(tomStr);
                status = activeEvent ? "tomorrow" : "";
            }

            if (activeEvent) {
                DOM.alertName.textContent = activeEvent.localizedName;
                DOM.alertGoBtn.href = activeEvent.link;
                DOM.alertBanner.classList.add('active');
                DOM.alertSubtitle.textContent = status === "today" ? texts.today_is : texts.tom_is;
            } else {
                DOM.alertBanner.classList.remove('active');
            }
        }

        function renderCalendar(month, year) {
            DOM.monthYearDisplay.textContent = `${texts.months[month]} ${year}`;
            DOM.calDays.innerHTML = '';

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = getISTDateString(0);

            for (let i = 0; i < firstDay; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'cal-cell empty';
                DOM.calDays.appendChild(emptyDiv);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell';
                cell.textContent = day;

                const y = year;
                const m = String(month + 1).padStart(2, '0');
                const d = String(day).padStart(2, '0');
                const cellDateStr = `${y}-${m}-${d}`;
                
                if(cellDateStr === todayStr) cell.classList.add('is-today');

                const eventForDay = eventsMap.get(cellDateStr);
                if (eventForDay) {
                    cell.classList.add('has-event');
                    cell.addEventListener('click', () => showSelectedSection(eventForDay, d, m, y));
                }
                DOM.calDays.appendChild(cell);
            }
        }

        function showSelectedSection(eventData, d, m, y) {
            DOM.selectedImg.src = APP_LOGO_URL; 
            DOM.selectedTitle.textContent = eventData.localizedName;
            DOM.selectedDate.innerHTML = `<i class="far fa-calendar-alt"></i> ${parseInt(d)} ${texts.months[parseInt(m)-1]} ${y}`;
            
            DOM.selectedSection.classList.add('active');
            setTimeout(() => DOM.selectedSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
            DOM.selectedSection.onclick = () => openPopup(eventData, d, m, y);
        }

        function openPopup(eventData, d, m, y) {
            DOM.modalImg.src = eventData.image; 
            DOM.modalTitle.textContent = eventData.localizedName;
            DOM.modalDate.textContent = `${parseInt(d)} ${texts.months[parseInt(m)-1]} ${y}`;

            const todayIST = getISTMidnight();
            const eventIST = getISTMidnight(new Date(y, parseInt(m)-1, d));
            const diffDays = Math.round((eventIST.getTime() - todayIST.getTime()) / (1000 * 60 * 60 * 24));

            if (diffDays === 0 || diffDays === 1) {
                DOM.modalGoBtn.style.display = 'block';
                DOM.modalGoBtn.href = eventData.link;
                DOM.modalInfoMsg.style.display = 'none'; 
            } else {
                DOM.modalGoBtn.style.display = 'none';
                DOM.modalInfoMsg.style.display = 'block'; 
            }

            DOM.modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePopup() {
            DOM.modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
