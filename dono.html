<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISKCON Bhuvaikuntha</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
      overflow:hidden;
    }

    .card{
      text-align:center;
      padding:40px 25px;
      width:90%;
      max-width:400px;
      border-radius:28px;
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(14px);
      box-shadow:0 8px 40px rgba(0,0,0,0.45);
    }

    .logo{
      font-size:44px;
      margin-bottom:12px;
    }

    h1{
      color:#f8fafc;
      font-size:28px;
      margin-bottom:10px;
      font-weight:700;
    }

    p{
      color:#cbd5e1;
      font-size:15px;
      line-height:1.6;
      margin-bottom:30px;
    }

    .open-btn{
      display:inline-block;
      padding:16px 28px;
      border:none;
      border-radius:16px;
      background: linear-gradient(135deg,#f59e0b,#f97316);
      color:#fff;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      box-shadow:0 6px 24px rgba(249,115,22,0.45);
      transition:all .25s ease;
    }

    .open-btn:hover{
      transform:translateY(-2px) scale(1.03);
      box-shadow:0 10px 28px rgba(249,115,22,0.6);
    }

    .open-btn:active{
      transform:scale(0.98);
    }

    .footer{
      margin-top:24px;
      color:#94a3b8;
      font-size:12px;
      letter-spacing:.4px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">🛕</div>

    <h1>ISKCON Bhuvaikuntha</h1>

    <p>
      Tap the button below to open the seva portal and continue your spiritual journey.
    </p>

    <button class="open-btn" onclick="openPortal()">
      Open Seva Portal
    </button>

    <div class="footer">
      Hare Krishna • Bhuvaikuntha
    </div>
  </div>

  <script>
    function openPortal(){
      window.location.href = 'https://semo-flax.vercel.app';
    }
  </script>

</body>
</html>
