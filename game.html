<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ISKCON - Play & Learn Hub</title>
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600;800&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* =========================================
           🛠️ PREMIUM STYLES (HUB PAGE)
           ========================================= */
        :root {
            --primary: #FF9933;       
            --secondary: #4a2c2a;     
            --bg-color: #FAFAFA;      
            --card-bg: #ffffff;       
            --text-color: #2b2b2b;       
            --ui-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            --powerful-shadow: 0 15px 35px rgba(255, 153, 51, 0.25);
            --transition-speed: 0.3s;
        }
        [data-theme="dark"] {
            --primary: #FF9933; 
            --secondary: #140804; 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-color: #ececec;
            --ui-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            --powerful-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }

        body { background-color: var(--bg-color); font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; color: var(--text-color); transition: background-color var(--transition-speed), color var(--transition-speed); padding-bottom: 40px; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        a { text-decoration: none; }

        /* Sleek Navbar */
        .top-navbar { background: linear-gradient(90deg, #E65100, var(--primary), #FF7043); background-size: 200% auto; animation: gradientMove 4s ease infinite; box-shadow: 0 4px 15px rgba(255, 153, 51, 0.4); padding: 12px 15px; position: sticky; top: 0; z-index: 1040; display: flex; align-items: center; justify-content: space-between; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .nav-left { display: flex; align-items: center; gap: 12px; }
        .back-btn { color: white; font-size: 1.4rem; text-shadow: 0 2px 4px rgba(0,0,0,0.3); transition: 0.2s; }
        .back-btn:active { transform: scale(0.9); }
        .page-title { color: white; font-family: 'Cinzel', serif; font-size: 1.25rem; font-weight: 800; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3); letter-spacing: 0.5px; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .action-icon { color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .action-icon:active { transform: scale(0.85); }

        /* Language Selector in Hub */
        .lang-select-mini { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; padding: 4px 8px; font-size: 0.8rem; font-weight: 600; outline: none; backdrop-filter: blur(5px); }
        .lang-select-mini option { color: black; }

        /* Welcome Banner */
        .welcome-banner { text-align: center; margin: 25px 15px; position: relative; }
        .welcome-title { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 800; color: var(--text-color); margin-bottom: 5px; line-height: 1.2; text-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .welcome-sub { font-size: 0.9rem; font-weight: 500; opacity: 0.8; }
        
        /* Magic Particles Background */
        .bg-particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, var(--primary) 0%, transparent 70%); opacity: 0.15; animation: floatUp 8s infinite linear; }
        .p1 { width: 100px; height: 100px; left: -20px; top: 10%; animation-duration: 6s; }
        .p2 { width: 150px; height: 150px; right: -40px; top: 40%; animation-duration: 9s; background: radial-gradient(circle, #D81B60 0%, transparent 70%); }
        .p3 { width: 80px; height: 80px; left: 30%; bottom: -10px; animation-duration: 7s; background: radial-gradient(circle, #1976D2 0%, transparent 70%); }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { opacity: 0.2; } 80% { opacity: 0.2; } 100% { transform: translateY(-150px) scale(1.2); opacity: 0; } }

        /* ================= EPIC HUB CARDS ================= */
        .hub-container { padding: 0 15px; display: flex; flex-direction: column; gap: 20px; }

        .hub-card { position: relative; border-radius: 22px; padding: 25px 20px; overflow: hidden; display: flex; align-items: center; justify-content: space-between; text-decoration: none; box-shadow: var(--ui-shadow); transition: transform 0.25s, box-shadow 0.25s; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .hub-card:active { transform: scale(0.94); box-shadow: var(--powerful-shadow); }
        
        /* Card Gradients */
        .card-story { background: linear-gradient(135deg, #8E24AA 0%, #D81B60 100%); }
        .card-quiz { background: linear-gradient(135deg, #F57F17 0%, #FF6F00 100%); }
        .card-game { background: linear-gradient(135deg, #1976D2 0%, #00796B 100%); }

        /* Card Content */
        .hc-content { flex-grow: 1; color: white; position: relative; z-index: 2; }
        .hc-title { font-family: 'Cinzel', serif; font-size: 1.45rem; font-weight: 800; margin: 0 0 5px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.4); line-height: 1.1; letter-spacing: 0.5px; }
        .hc-desc { font-size: 0.8rem; font-weight: 500; opacity: 0.9; margin-bottom: 12px; line-height: 1.3; font-family: 'Poppins', sans-serif; }
        
        .hc-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; color: white; backdrop-filter: blur(5px); transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .hub-card:active .hc-btn { background: white; color: black; }

        /* Card Icons & Magic Elements */
        .hc-icon-wrapper { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: white; border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(255,255,255,0.2), inset 0 0 15px rgba(255,255,255,0.2); position: relative; z-index: 2; flex-shrink: 0; animation: floatIcon 3s ease-in-out infinite; }
        @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* Background Watermark/Flare */
        .hc-watermark { position: absolute; right: -10%; top: -20%; font-size: 8rem; opacity: 0.08; color: white; z-index: 1; transform: rotate(-15deg); pointer-events: none; }
        .hc-flare { position: absolute; width: 100%; height: 100%; top: 0; left: -100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transform: skewX(-25deg); animation: shine 4s infinite; z-index: 1; }
        @keyframes shine { 0%, 20% { left: -100%; } 100% { left: 200%; } }

    </style>
</head>
<body>

<!-- Particles Background -->
<div class="bg-particles">
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
</div>

<!-- Top Navbar -->
<div class="top-navbar">
    <div class="nav-left">
        <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 class="page-title" data-key="page_title">Play & Learn</h1>
    </div>
    <div class="nav-right">
        <select class="lang-select-mini" id="langSelector" onchange="setLanguage(this.value)">
            <option value="en">EN</option>
            <option value="hi">HI</option>
            <option value="mr">MR</option>
        </select>
        <div class="action-icon" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
    </div>
</div>

<!-- Welcome Header -->
<div class="welcome-banner" data-aos="fade-down" data-aos-duration="600">
    <h2 class="welcome-title" data-key="welcome_head">Divine Play Zone</h2>
    <p class="welcome-sub" data-key="welcome_sub">Explore sacred stories, test your knowledge, and play divine games!</p>
</div>

<!-- HUB CARDS CONTAINER -->
<div class="hub-container">
    
    <!-- 1. STORIES CARD -->

    <!-- 2. QUIZ CARD -->
    <a href="quizhome.html" class="hub-card card-quiz" data-aos="zoom-in" data-aos-delay="200">
        <i class="fas fa-brain hc-watermark"></i>
        <div class="hc-flare" style="animation-delay: 1s;"></div>
        <div class="hc-content">
            <h3 class="hc-title" data-key="quiz_title">Master Quiz</h3>
            <p class="hc-desc" data-key="quiz_desc">Test your knowledge of the Bhagavad Gita and Vedic wisdom.</p>
            <div class="hc-btn"><span data-key="btn_play">Start Quiz</span> <i class="fas fa-play"></i></div>
        </div>
        <div class="hc-icon-wrapper">
            <i class="fas fa-trophy"></i>
        </div>
    </a>

    <!-- 3. GAMES CARD -->
    <a href="cri.html" class="hub-card card-game" data-aos="zoom-in" data-aos-delay="300">
        <i class="fas fa-gamepad hc-watermark"></i>
        <div class="hc-flare" style="animation-delay: 2s;"></div>
        <div class="hc-content">
            <h3 class="hc-title" data-key="game_title">Divine Games</h3>
            <p class="hc-desc" data-key="game_desc">Play memory matches, puzzles, and interactive fun games.</p>
            <div class="hc-btn"><span data-key="btn_play_game">Play Games</span> <i class="fas fa-gamepad"></i></div>
        </div>
        <div class="hc-icon-wrapper">
            <i class="fas fa-puzzle-piece"></i>
        </div>
    </a>

</div>

<!-- External Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    // Initialize Animations
    AOS.init({ once: true, offset: 20, easing: 'ease-out-cubic' });

    // ==========================================
    // 🌍 MULTI-LANGUAGE SYSTEM
    // ==========================================
    const langData = {
        en: {
            page_title: "Play & Learn",
            welcome_head: "Divine Play Zone",
            welcome_sub: "Explore sacred stories, test your knowledge, and play divine games!",
            story_title: "Divine Stories",
            story_desc: "Read fascinating tales of Lord Krishna & great devotees.",
            btn_read: "Read Now",
            quiz_title: "Master Quiz",
            quiz_desc: "Test your knowledge of the Bhagavad Gita and Vedic wisdom.",
            btn_play: "Start Quiz",
            game_title: "Divine Games",
            game_desc: "Play memory matches, puzzles, and interactive fun games.",
            btn_play_game: "Play Games"
        },
        hi: {
            page_title: "खेलें और सीखें",
            welcome_head: "दिव्य प्ले ज़ोन",
            welcome_sub: "पवित्र कहानियाँ पढ़ें, अपने ज्ञान का परीक्षण करें और दिव्य खेल खेलें!",
            story_title: "दिव्य कहानियाँ",
            story_desc: "भगवान कृष्ण और महान भक्तों की आकर्षक कहानियाँ पढ़ें।",
            btn_read: "अभी पढ़ें",
            quiz_title: "मास्टर क्विज़",
            quiz_desc: "भगवद गीता और वैदिक ज्ञान पर अपनी समझ का परीक्षण करें।",
            btn_play: "क्विज़ शुरू करें",
            game_title: "दिव्य खेल",
            game_desc: "मेमोरी मैच, पहेलियाँ और मज़ेदार इंटरेक्टिव गेम्स खेलें।",
            btn_play_game: "गेम्स खेलें"
        },
        mr: {
            page_title: "खेळा आणि शिका",
            welcome_head: "दिव्य प्ले झोन",
            welcome_sub: "पवित्र कथा वाचा, तुमच्या ज्ञानाची चाचणी घ्या आणि दिव्य खेळ खेळा!",
            story_title: "दिव्य कथा",
            story_desc: "भगवान कृष्ण आणि महान भक्तांच्या आकर्षक कथा वाचा.",
            btn_read: "आता वाचा",
            quiz_title: "मास्टर क्विझ",
            quiz_desc: "भगवद्गीता आणि वैदिक ज्ञानावर तुमची समज तपासा.",
            btn_play: "क्विझ सुरु करा",
            game_title: "दिव्य खेळ",
            game_desc: "मेमरी मॅच, कोडी आणि मजेदार संवादात्मक खेळ खेळा.",
            btn_play_game: "खेळ खेळा"
        }
    };

    function setLanguage(lang) {
        localStorage.setItem('lang', lang);
        document.getElementById('langSelector').value = lang;
        const texts = langData[lang];
        
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if(texts[key]) el.innerHTML = texts[key];
        });
    }

    // ==========================================
    // 🌙 THEME LOGIC
    // ==========================================
    if(localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
    }
    
    function toggleTheme() {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    // Initialize Language on Load
    const savedLang = localStorage.getItem('lang') || 'en';
    setLanguage(savedLang);

</script>
</body>
</html>
