<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ISKCON Gallery</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <style>
        :root { --primary: #FF9933; --bg-dark: #050505; --epic-shadow: 0 10px 25px rgba(0, 0, 0, 0.7); }
        body { background-color: var(--bg-dark); background-image: radial-gradient(circle at top right, #1a1005 0%, transparent 50%); font-family: 'Poppins', sans-serif; color: #fff; margin: 0; padding-bottom: 40px; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
        
        /* True Loader */
        .super-loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease-out; }
        .spinner-mandala { width: 60px; height: 60px; border: 4px solid rgba(255, 153, 51, 0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; will-change: transform; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Premium Header */
        .premium-header { position: sticky; top: 0; z-index: 1040; background: rgba(10, 5, 2, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 153, 51, 0.15); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.6); transform: translateZ(0); }
        .header-title { font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 800; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .lang-select { background: rgba(255,153,51,0.15); border: 1px solid var(--primary); color: #fff; border-radius: 8px; padding: 4px 8px; outline: none; font-size: 0.9rem; }

        /* Filters */
        .filter-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 12px 18px 6px; scrollbar-width: none; white-space: nowrap; align-items: center; -webkit-overflow-scrolling: touch; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ddd; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.25s ease; white-space: nowrap; }
        .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 500; box-shadow: 0 4px 10px rgba(255,153,51,0.2); }
        .date-filter-input { background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: var(--primary); border-radius: 20px; padding: 5px 12px; font-family: 'Poppins', sans-serif; font-size: 0.85rem; outline: none; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.8; }

        /* Gallery Grid */
        .pswp-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 14px; }
        .date-header-row { grid-column: 1 / -1; font-family: 'Cinzel', serif; color: var(--primary); font-size: 1.15rem; font-weight: 800; border-bottom: 1px solid rgba(255,153,51,0.2); padding-bottom: 4px; margin-top: 10px; display: flex; align-items: center; gap: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        /* Optimized Gallery Items */
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 3/4; background: #111; box-shadow: var(--epic-shadow); text-decoration: none; display: block; transform: translateZ(0); content-visibility: auto; contain-intrinsic-size: 150px 200px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease-in-out; will-change: opacity; }
        .gallery-item.loaded img { opacity: 1; }
        
        .watermark-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 800; color: rgba(255, 255, 255, 0.15); pointer-events: none; z-index: 5; text-align: center; width: 100%; }
        
        /* Auto-Adjusting Full Name Box */
        .caption-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.7) 40%, rgba(0,0,0,0.95) 100%); padding: 25px 8px 10px; text-align: center; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        .cap-title { font-size: 0.8rem; font-weight: 500; color: #fff; display: block; word-wrap: break-word; white-space: normal; line-height: 1.3; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .empty-state { grid-column: 1 / -1; text-align: center; padding: 40px 20px; color: #888; display: none; }
        #scroll-trigger { grid-column: 1 / -1; height: 1px; width: 100%; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <!-- Genuine Loader -->
    <div id="super-loader" class="super-loader">
        <div class="spinner-mandala"></div>
        <div style="color:var(--primary); font-family:'Cinzel', serif; font-weight:700; margin-top:15px; letter-spacing:1px;">Loading Darshan...</div>
    </div>

    <!-- Header -->
    <div class="premium-header">
        <!-- Changed go:home to index.html -->
        <a href="index.html" style="color: #fff; font-size: 1.2rem; text-decoration: none;"><i class="fas fa-arrow-left"></i></a>
        <h1 class="header-title">Divine Gallery</h1>
        <select class="lang-select" id="languageSelector" onchange="changeLanguage(this.value)">
            <option value="en">EN</option>
            <option value="hi">HI</option>
            <option value="mr">MR</option>
        </select>
    </div>

    <!-- Filters -->
    <div class="filter-scroll" id="categoryFilters">
        <input type="date" class="date-filter-input" id="datePickerFilter">
        <div class="filter-chip active" data-filter="all">All Darshan</div>
        <div class="filter-chip" data-filter="daily">Daily Darshan</div>
        <div class="filter-chip" data-filter="festival">Festivals</div>
        <div class="filter-chip" data-filter="event">Events</div>
    </div>

    <!-- Gallery Area -->
    <div class="pswp-gallery" id="my-gallery">
        <div class="empty-state" id="emptyState">
            <i class="fas fa-image" style="font-size:3rem; margin-bottom:10px; opacity:0.5;"></i><br>No Darshan Found.
        </div>
        <div id="scroll-trigger"></div>
    </div>

    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';
        import PhotoSwipe from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAEbzUad0edV07OMF2slPJyJeWd10-Clc8", authDomain: "image-hit-7ce47.firebaseapp.com", databaseURL: "https://image-hit-7ce47-default-rtdb.firebaseio.com", projectId: "image-hit-7ce47" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const APP_LINK = "https://iskcon-gallery.web.app";
        let allDarshanData = [];
        let flattenedList = [];
        let renderIndex = 0;
        const CHUNK_SIZE = 10; // Load 10 at a time for maximum performance
        
        let currentFilter = 'all';
        let currentDateFilter = '';
        
        // Loader State Management
        let isInitialLoad = true;
        let imagesToLoadForFirstBatch = 0;
        let imagesLoadedForFirstBatch = 0;
        let loaderFallbackTimeout;

        const staticImages = [
            { id: "s1", imageUrl: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjEl4fFheeQljSLtRMh5Gnq3c3j6xqwSfX3YeN4pI02ebfKmtwsFXLauHOMBNdClFdgXpkaV2j5gJFwxDBMDcUVi-fonSaA8qFPnpaMPlO6u305qP0rcPqGa4iufh-W5bIXbMLIHYjApRlZhF2uw8CFb65UikYDB42pU9Iu2xW1hRSiA2gGzqvaxP9V1APd/s1600/1000096371.webp", category: "event", title_en: "Temple Entrance", darshan_date: "All Time Classic" },
            { id: "s2", imageUrl: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj2iMJBEfqMuK3Oa3mKqhQkVHVL8lTJ0p1YoyX77hCJwiVLpxzuMoQGxiM8qU2lU5DXGGvafYIaTKEMmKak18XBD9pr6R8fJZugNTdmoiY4lgiSQjBCe-CgXI2lDe1bvMYs6_koVGSXqlMxTuhNitYEBXwoS_amo726zM2GXMUY0uY2JTnmi3oFtqIdLwJy/s1600/1000096372.webp", category: "daily", title_en: "Sri Sri Gaura Nitai", darshan_date: "All Time Classic" },
            { id: "s3", imageUrl: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgftLPu_jM1WHAD6_G2d4oMSu8SRkHeb6ZE3OLM2HyXiyDPY2Ch0b2Zk18g0kGFJHd8zseNi7dMUZFz7WmuehpnHtGlOXGSedcwy4hWt0G8oWMwuU0fBw_OWAX0ZcnkIW0yomsKcwoV8KrrlVYAMErXxJMIpZk3v1cxnZKuRXWUL3lzwzgW3PzsBg2t_ger/s700/1000096370.webp", category: "daily", title_en: "Main Altar", darshan_date: "All Time Classic" },
            { id: "s4", imageUrl: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjTdGA5YE6KB8Vjv_NB-dvHEDho3t5JXv5Cl0V2LRW6nZrujh_kasEl4AixZ-1RyWLDiaWWDnkTgabDUTbKsfiKGTeZwras2RH5nCzo5aaL2uxB9zUyn8zWw9QRH02nOo0XBrWezCUFp-Qe_9Q3QHgYLiDsMJrW1w_hxXc28YRUMmbx-hvXm2oW-I_WoBSw/s700/1000096373.webp", category: "festival", title_en: "Govardhan Puja", darshan_date: "All Time Classic" }
        ];

        window.shareToWhatsApp = function(title, url) { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(`🙏 *Hare Krishna!*\n\nDarshan: *${title}*\n🖼️ Image: ${url}\n📲 *App:* ${APP_LINK}`)}`, '_blank'); };
        window.shareToStatus = function(title, url) { window.location.href = `whatsapp://send?text=${encodeURIComponent(`🙏 *Hare Krishna!*\n*${title}*\n🖼️ Image: ${url}\n👇 *App:* ${APP_LINK}`)}`; };

        let lightbox = new PhotoSwipeLightbox({ gallery: '#my-gallery', children: 'a:not(.hidden-data)', pswpModule: PhotoSwipe, bgOpacity: 0.95 });
        let customCaptionEl;
        
        lightbox.on('beforeOpen', () => {
            if(!document.getElementById('custom-cap')) {
                customCaptionEl = document.createElement('div'); customCaptionEl.id = 'custom-cap';
                customCaptionEl.style = 'position:fixed; bottom:25px; left:0; width:100%; text-align:center; z-index:99999; pointer-events:none; display:flex; justify-content:center; padding: 0 15px;';
                document.body.appendChild(customCaptionEl);
            }
        });
        lightbox.on('change', () => {
            if (lightbox.pswp.currSlide && lightbox.pswp.currSlide.data.element) {
                customCaptionEl.innerHTML = lightbox.pswp.currSlide.data.element.getAttribute('data-caption') || '';
            }
        });
        lightbox.on('close', () => { if(customCaptionEl) { customCaptionEl.remove(); customCaptionEl = null; } });
        lightbox.init();

        const galleryContainer = document.getElementById('my-gallery');
        const emptyState = document.getElementById('emptyState');
        const scrollTrigger = document.getElementById('scroll-trigger');

        // Caching Logic: Load instantly from Local Storage if available
        const cachedData = localStorage.getItem('iskcon_darshan_cache_v2');
        if (cachedData) {
            try {
                allDarshanData = JSON.parse(cachedData);
                buildAndRenderList(true);
            } catch(e) { console.error("Cache parsing error", e); }
        }

        // Fetch API Data
        const q = query(collection(db, "iskcon_images"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            let fetchedData = [];
            snapshot.forEach(doc => fetchedData.push(doc.data()));
            
            allDarshanData = [...fetchedData, ...staticImages];
            localStorage.setItem('iskcon_darshan_cache_v2', JSON.stringify(allDarshanData));
            
            buildAndRenderList(true); // Re-render with fresh data
        });

        // Step 1: Filter & Group Data
        function buildAndRenderList(reset = false) {
            if (reset) {
                renderIndex = 0;
                document.querySelectorAll('.gallery-item, .date-header-row').forEach(el => el.remove());
            }

            const lang = localStorage.getItem('lang') || 'en';
            
            let filtered = allDarshanData.filter(item => {
                let catMatch = currentFilter === 'all' || item.category === currentFilter;
                let dateMatch = currentDateFilter === '' || item.darshan_date === currentDateFilter;
                if(item.darshan_date === "All Time Classic" && currentDateFilter === '') dateMatch = true; 
                return catMatch && dateMatch;
            });

            if (filtered.length === 0) { 
                emptyState.style.display = 'block'; 
                checkAndHideLoader(true);
                return; 
            }
            emptyState.style.display = 'none';

            let groupedData = {};
            filtered.forEach(item => {
                let dateKey = item.darshan_date || 'Unknown Date';
                if(!groupedData[dateKey]) groupedData[dateKey] = [];
                groupedData[dateKey].push(item);
            });

            let sortedDates = Object.keys(groupedData).sort((a, b) => {
                if (a === "All Time Classic") return 1;
                if (b === "All Time Classic") return -1;
                return new Date(b) - new Date(a);
            });

            flattenedList = [];
            sortedDates.forEach(dateText => {
                let friendlyDate = dateText === "All Time Classic" ? "✨ Eternal Darshan" : new Date(dateText).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
                flattenedList.push({ isHeader: true, html: `<div class="date-header-row"><i class="far fa-calendar-alt"></i> ${friendlyDate}</div>` });
                groupedData[dateText].forEach(data => flattenedList.push({ isHeader: false, data: data }));
            });

            if (reset) renderNextChunk();
        }

        // Step 2: Chunk Rendering
        function renderNextChunk() {
            if (renderIndex >= flattenedList.length) return; 

            const fragment = document.createDocumentFragment();
            const chunk = flattenedList.slice(renderIndex, renderIndex + CHUNK_SIZE);
            const lang = localStorage.getItem('lang') || 'en';

            chunk.forEach(item => {
                if (item.isHeader) {
                    const temp = document.createElement('div');
                    temp.innerHTML = item.html;
                    fragment.appendChild(temp.firstElementChild);
                } else {
                    const data = item.data;
                    const title = lang === 'hi' ? (data.title_hi || data.title_en) : (lang === 'mr' ? (data.title_mr || data.title_en) : data.title_en);
                    
                    const captionHtml = `
                        <div style="background:rgba(10,10,10,0.9); padding:16px; border-radius:18px; border:1px solid rgba(255,153,51,0.4); display:inline-block; pointer-events:auto; box-shadow: 0 10px 25px rgba(0,0,0,0.9); width: 100%; max-width: 90vw; box-sizing: border-box;">
                            <strong style="color:#FFD700; font-size:1.1rem; display:block; margin-bottom:12px; white-space: normal; word-wrap: break-word; line-height: 1.3;">${title}</strong>
                            <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
                                <button onclick="shareToWhatsApp('${title}', '${data.imageUrl}')" style="background:#25D366; color:#fff; border:none; padding:8px 16px; border-radius:20px; font-weight:600; font-size: 0.9rem;"><i class="fab fa-whatsapp"></i> Share</button>
                                <button onclick="shareToStatus('${title}', '${data.imageUrl}')" style="background:#128C7E; color:#fff; border:none; padding:8px 16px; border-radius:20px; font-weight:600; font-size: 0.9rem;"><i class="fas fa-circle-notch"></i> Status</button>
                                <a href="${data.imageUrl}" download target="_blank" style="background:transparent; border:1px solid #FF9933; color:#fff; padding:8px 16px; border-radius:20px; text-decoration:none;"><i class="fas fa-download"></i></a>
                            </div>
                        </div>`;
                    
                    const a = document.createElement('a');
                    a.className = 'gallery-item';
                    a.href = data.imageUrl;
                    a.setAttribute('data-pswp-width', data.width || 800);
                    a.setAttribute('data-pswp-height', data.height || 1000);
                    a.setAttribute('data-caption', captionHtml);
                    
                    a.innerHTML = `
                        <div class="watermark-overlay">ISKCON HADAPSAR</div>
                        <img src="${data.imageUrl}" alt="Darshan" loading="${isInitialLoad ? 'eager' : 'lazy'}">
                        <div class="caption-overlay"><span class="cap-title">${title || 'Darshan'}</span></div>
                    `;
                    fragment.appendChild(a);

                    const imgEl = a.querySelector('img');
                    if (isInitialLoad) {
                        imagesToLoadForFirstBatch++;
                        imgEl.onload = () => { a.classList.add('loaded'); imagesLoadedForFirstBatch++; checkAndHideLoader(); };
                        imgEl.onerror = () => { a.classList.add('loaded'); imagesLoadedForFirstBatch++; checkAndHideLoader(); };
                    } else {
                        imgEl.onload = () => a.classList.add('loaded');
                    }
                }
            });

            galleryContainer.insertBefore(fragment, scrollTrigger);
            renderIndex += CHUNK_SIZE;

            try { lightbox.destroy(); } catch(e){}
            lightbox.init();

            if (isInitialLoad && imagesToLoadForFirstBatch === 0) {
                checkAndHideLoader(true);
            }
            
            if(isInitialLoad && !loaderFallbackTimeout) {
                loaderFallbackTimeout = setTimeout(() => checkAndHideLoader(true), 6000);
            }
        }

        // Loader Verification
        function checkAndHideLoader(force = false) {
            if (force || imagesLoadedForFirstBatch >= imagesToLoadForFirstBatch) {
                isInitialLoad = false;
                const loader = document.getElementById('super-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 400);
                }
            }
        }

        // Intersection Observer for Infinite Scroll
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isInitialLoad) {
                renderNextChunk();
            }
        }, { rootMargin: '300px' }); 
        observer.observe(scrollTrigger);

        // Filter Handlers
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilter = chip.getAttribute('data-filter');
                buildAndRenderList(true);
            });
        });

        document.getElementById('datePickerFilter').addEventListener('change', (e) => {
            currentDateFilter = e.target.value; 
            buildAndRenderList(true);
        });

        window.changeLanguage = function(lang) { 
            localStorage.setItem('lang', lang); 
            buildAndRenderList(true); 
        };
        document.getElementById('languageSelector').value = localStorage.getItem('lang') || 'en';

    </script>
</body>
</html>
